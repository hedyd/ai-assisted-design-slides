<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 710 430" fill="none" font-family="'DM Sans', system-ui, sans-serif">
  <!-- Column headers -->
  <text x="105" y="24" font-size="13" font-weight="500" fill="#8A8580" letter-spacing="0.5">You</text>
  <text x="330" y="24" font-size="13" font-weight="500" fill="#8A8580" letter-spacing="0.5" text-anchor="middle">Claude Code Web</text>
  <text x="600" y="24" font-size="13" font-weight="500" fill="#8A8580" letter-spacing="0.5" text-anchor="middle">Your live site</text>

  <!-- Dashed green vertical line (right column) -->
  <line x1="600" y1="105" x2="600" y2="345" stroke="#8CB88C" stroke-width="1.5" stroke-dasharray="6 4"/>

  <!-- ═══ ROW 1 ═══ -->
  <!-- Give Claude a task -->
  <rect x="30" y="50" width="160" height="40" rx="8" fill="#F0EDE7" stroke="#D9D5CE" stroke-width="1.2"/>
  <text x="110" y="75" font-size="13" font-weight="500" fill="#1A1918" text-anchor="middle">Give Claude a task</text>

  <!-- Arrow: Give task → Creates branch -->
  <line x1="190" y1="70" x2="215" y2="70" stroke="#D9D5CE" stroke-width="1.2"/>
  <polygon points="215,66 223,70 215,74" fill="#D9D5CE"/>

  <!-- Creates feature branch -->
  <rect x="225" y="45" width="220" height="52" rx="10" fill="#E8E6F8" stroke="#C9C5F0" stroke-width="1.2"/>
  <text x="335" y="68" font-size="14" font-weight="600" fill="#3B3980" text-anchor="middle">Creates feature branch</text>
  <text x="335" y="85" font-size="11" font-weight="300" fill="#7A78A8" text-anchor="middle" font-style="italic">e.g. new-homepage</text>

  <!-- main (your live site) -->
  <rect x="520" y="50" width="155" height="48" rx="8" fill="#F0F7F0" stroke="#8CB88C" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="598" y="70" font-size="14" font-weight="600" fill="#3D6B3D" text-anchor="middle">main</text>
  <text x="598" y="86" font-size="11" font-weight="300" fill="#6A9B6A" text-anchor="middle">your live site</text>

  <!-- ═══ Arrow down from Creates branch ═══ -->
  <line x1="335" y1="97" x2="335" y2="140" stroke="#C9C5F0" stroke-width="1.2"/>
  <polygon points="331,140 335,148 339,140" fill="#C9C5F0"/>

  <!-- ═══ ROW 2 ═══ -->
  <!-- Close your laptop -->
  <rect x="40" y="150" width="150" height="40" rx="8" fill="#F0EDE7" stroke="#D9D5CE" stroke-width="1.2"/>
  <text x="115" y="175" font-size="13" font-weight="500" fill="#1A1918" text-anchor="middle">Close your laptop</text>

  <!-- Dashed arrow: Close laptop → Works in cloud -->
  <line x1="190" y1="170" x2="218" y2="170" stroke="#D9D5CE" stroke-width="1.2" stroke-dasharray="4 3"/>
  <polygon points="218,166 226,170 218,174" fill="#D9D5CE"/>

  <!-- Works in the cloud -->
  <rect x="228" y="145" width="220" height="52" rx="10" fill="#E8E6F8" stroke="#C9C5F0" stroke-width="1.2"/>
  <text x="338" y="167" font-size="14" font-weight="600" fill="#3B3980" text-anchor="middle">Works in the cloud</text>
  <text x="338" y="185" font-size="11" font-weight="300" fill="#7A78A8" text-anchor="middle">edits files, runs checks</text>

  <!-- ═══ Arrow down from Works in cloud ═══ -->
  <line x1="338" y1="197" x2="338" y2="240" stroke="#C9C5F0" stroke-width="1.2"/>
  <polygon points="334,240 338,248 342,240" fill="#C9C5F0"/>

  <!-- ═══ ROW 3 ═══ -->
  <!-- You review -->
  <rect x="40" y="250" width="130" height="40" rx="8" fill="#F0EDE7" stroke="#D9D5CE" stroke-width="1.2"/>
  <text x="105" y="275" font-size="13" font-weight="500" fill="#1A1918" text-anchor="middle">You review</text>

  <!-- Arrow: Opens PR → You review -->
  <line x1="228" y1="270" x2="175" y2="270" stroke="#D9D5CE" stroke-width="1.2"/>
  <polygon points="175,266 167,270 175,274" fill="#D9D5CE"/>

  <!-- Opens a pull request -->
  <rect x="230" y="245" width="220" height="52" rx="10" fill="#E8E6F8" stroke="#C9C5F0" stroke-width="1.2"/>
  <text x="340" y="267" font-size="14" font-weight="600" fill="#3B3980" text-anchor="middle">Opens a pull request</text>
  <text x="340" y="285" font-size="11" font-weight="300" fill="#7A78A8" text-anchor="middle">shows you every change</text>

  <!-- ═══ Arrows down to row 4 ═══ -->
  <!-- From You review down -->
  <line x1="105" y1="290" x2="105" y2="345" stroke="#D9D5CE" stroke-width="1.2"/>
  <polygon points="101,345 105,353 109,345" fill="#D9D5CE"/>

  <!-- From Opens PR down (to Claude never touches) -->
  <line x1="340" y1="297" x2="340" y2="345" stroke="#C9C5F0" stroke-width="1.2"/>
  <polygon points="336,345 340,353 344,345" fill="#C9C5F0"/>

  <!-- ═══ ROW 4 — Merge ═══ -->
  <!-- Approve + merge -->
  <rect x="30" y="355" width="155" height="42" rx="8" fill="#E8F5E9" stroke="#81C784" stroke-width="1.2"/>
  <text x="108" y="381" font-size="14" font-weight="600" fill="#2E7D32" text-anchor="middle">Approve + merge</text>

  <!-- Arrow: Approve → Claude never touches -->
  <line x1="185" y1="376" x2="210" y2="376" stroke="#D9D5CE" stroke-width="1.2"/>
  <polygon points="210,372 218,376 210,380" fill="#D9D5CE"/>

  <!-- Claude never touches main -->
  <rect x="220" y="350" width="250" height="52" rx="10" fill="#FFF8E1" stroke="#FFE082" stroke-width="1.2"/>
  <text x="345" y="372" font-size="14" font-weight="600" fill="#6D5D00" text-anchor="middle">Claude never touches main</text>
  <text x="345" y="390" font-size="11" font-weight="300" fill="#9E8D2A" text-anchor="middle">you always approve first</text>

  <!-- Arrow: Claude never touches → main updated -->
  <line x1="470" y1="376" x2="515" y2="376" stroke="#D9D5CE" stroke-width="1.2"/>
  <polygon points="515,372 523,376 515,380" fill="#D9D5CE"/>

  <!-- main updated -->
  <rect x="525" y="350" width="155" height="52" rx="8" fill="#E8F5E9" stroke="#81C784" stroke-width="1.2"/>
  <text x="603" y="372" font-size="14" font-weight="600" fill="#2E7D32" text-anchor="middle">main updated</text>
  <text x="603" y="390" font-size="11" font-weight="300" fill="#4CAF50" text-anchor="middle">Vercel rebuilds</text>
</svg>
